# 1. Đăng ký tên ứng dụng và profile hoạt động mặc định
spring.application.name=lorofy
spring.profiles.active=local

# 2. Cấu hình đưa giao diện Swagger UI về /api-docs và JSON thô về /api-docs-json
springdoc.swagger-ui.path=/api-docs
springdoc.api-docs.path=/api-docs-json

# ===================================================================
# Database Connection Placeholders (Neon PostgreSQL)
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/neondb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA & Hibernate Settings
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Hikari Connection Pool Settings (Tối ưu hóa cho Neon Serverless)
# ===================================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=30000

# ===================================================================
# Flyway Database Migration Settings
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===================================================================
# JWT Configuration Placeholders
# ===================================================================
app.jwt.secret=${JWT_SECRET:default_dummy_secret_key_must_be_large_enough_at_least_256_bit_long_for_security}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===================================================================
# Cloudinary Configuration Placeholders
# ===================================================================
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===================================================================
# Redis Configuration
# ===================================================================
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# Tối ưu hóa connection pool cho Redis (Lettuce)
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2

# ===================================================================
# Actuator Health Check (Chuẩn Production)
# ===================================================================
# Đưa base path của Actuator về /api/v1 thay vì /actuator mặc định
management.endpoints.web.base-path=/api/v1
# Chỉ mở endpoint health
management.endpoints.web.exposure.include=health
# Hiển thị thông tin chi tiết trạng thái kết nối DB và Redis
management.endpoint.health.show-details=always
# Cho phép hiển thị các endpoint của Actuator lên Swagger UI
springdoc.show-actuator=true
